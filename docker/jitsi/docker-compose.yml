# Lumicoria Meet — Self-hosted Jitsi Meet stack
#
# Stack: web (lobby + iframe) → prosody (XMPP + JWT auth)
#        → jicofo (focus) → jvb (video bridge) → jibri (recording)
#        + coturn (NAT traversal for participants behind symmetric NATs)
#
# Deploy: `cd backend/docker/jitsi && docker compose --env-file .env up -d`
# Reverse-proxy `meet.lumicoria.ai` → web:${HTTP_PORT} via nginx / Cloudflare.
#
# Before first boot, generate auth secrets — see README "First-time setup".
#
# Image tag policy: pin to a specific Jitsi release (JITSI_IMAGE_VERSION
# env var) so deploys are reproducible. To upgrade: bump the tag in `.env`,
# `docker compose pull`, `docker compose up -d --force-recreate`. Tags
# follow Jitsi's release page: https://github.com/jitsi/docker-jitsi-meet/releases

services:

  # ── Frontend (lobby + iframe served by nginx) ─────────────────────────
  web:
    image: jitsi/web:${JITSI_IMAGE_VERSION:-stable-10078}
    restart: unless-stopped
    container_name: jitsi-web
    ports:
      - "${HTTP_PORT:-8000}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ${CONFIG}/web:/config:Z
      - ${CONFIG}/web/letsencrypt:/etc/letsencrypt:Z
      - ${CONFIG}/transcripts:/usr/share/jitsi-meet/transcripts:Z
      # Lumicoria branding overrides — mounted read-only so a container
      # rebuild can't lose them. See README "Branding overrides".
      - ${CONFIG}/web/custom-config.js:/config/custom-config.js:ro
      - ${CONFIG}/web/custom-interface_config.js:/config/custom-interface_config.js:ro
    environment:
      # Auth
      - ENABLE_AUTH
      - ENABLE_GUESTS
      - ENABLE_LOBBY
      - ENABLE_PREJOIN_PAGE
      - PUBLIC_URL
      - TZ
      - JWT_APP_ID
      - JWT_APP_SECRET
      - JWT_ACCEPTED_ISSUERS
      - JWT_ACCEPTED_AUDIENCES
      - TOKEN_AUTH_URL
      # XMPP plumbing
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_BOSH_URL_BASE
      - XMPP_GUEST_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_RECORDER_DOMAIN
      # Misc
      - ETHERPAD_URL_BASE
      - TURNCREDENTIALS_SECRET
      - TURN_HOST
      - TURNS_HOST
      - TURN_PORT
      - TURNS_PORT
      # TLS
      - DISABLE_HTTPS
      - LETSENCRYPT_DOMAIN
      - LETSENCRYPT_EMAIL
      - LETSENCRYPT_USE_STAGING
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      jitsi:
        aliases:
          - meet.lumicoria.local

  # ── Prosody (XMPP) — gates auth via JWT token ────────────────────────
  prosody:
    image: jitsi/prosody:${JITSI_IMAGE_VERSION:-stable-10078}
    restart: unless-stopped
    container_name: jitsi-prosody
    expose:
      - "5222"
      - "5347"
      - "5280"
    volumes:
      - ${CONFIG}/prosody/config:/config:Z
      - ${CONFIG}/prosody/prosody-plugins-custom:/prosody-plugins-custom:Z
    environment:
      # Auth
      - AUTH_TYPE
      - ENABLE_AUTH
      - ENABLE_GUESTS
      - ENABLE_LOBBY
      - GLOBAL_MODULES
      - GLOBAL_CONFIG
      # XMPP plumbing
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_GUEST_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_MODULES
      - XMPP_MUC_MODULES
      - XMPP_INTERNAL_MUC_MODULES
      - XMPP_RECORDER_DOMAIN
      # JWT
      - JWT_APP_ID
      - JWT_APP_SECRET
      - JWT_ACCEPTED_ISSUERS
      - JWT_ACCEPTED_AUDIENCES
      - JWT_ALLOW_EMPTY
      - JWT_AUTH_TYPE
      - JWT_TOKEN_AUTH_MODULE
      # Service users
      - JIBRI_RECORDER_USER
      - JIBRI_RECORDER_PASSWORD
      - JIBRI_XMPP_USER
      - JIBRI_XMPP_PASSWORD
      - JICOFO_AUTH_USER
      - JICOFO_AUTH_PASSWORD
      - JVB_AUTH_USER
      - JVB_AUTH_PASSWORD
      - TZ
    healthcheck:
      test: ["CMD-SHELL", "prosodyctl --config /config/prosody.cfg.lua status || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      jitsi:
        aliases:
          - xmpp.meet.lumicoria.local

  # ── Jicofo (conference focus) ────────────────────────────────────────
  jicofo:
    image: jitsi/jicofo:${JITSI_IMAGE_VERSION:-stable-10078}
    restart: unless-stopped
    container_name: jitsi-jicofo
    volumes:
      - ${CONFIG}/jicofo:/config:Z
    environment:
      # Auth — JICOFO must be told to honour JWT tokens, otherwise it falls
      # back to internal user/password auth and refuses JWT-authed users.
      - AUTH_TYPE
      - ENABLE_AUTH
      - JICOFO_ENABLE_AUTH=1
      - JICOFO_AUTH_TYPE=jwt
      - JICOFO_AUTH_LIFETIME=24 hours
      # XMPP plumbing
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_RECORDER_DOMAIN
      - XMPP_SERVER
      # Service users
      - JICOFO_AUTH_USER
      - JICOFO_AUTH_PASSWORD
      - JICOFO_COMPONENT_SECRET
      - JICOFO_ENABLE_BRIDGE_HEALTH_CHECKS
      - JICOFO_CONF_SSRC_REWRITING
      - JICOFO_ENABLE_AUTO_LOGIN
      - TZ
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/about/health -o /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    depends_on:
      prosody:
        condition: service_healthy
    networks:
      jitsi:

  # ── Jitsi Video Bridge (JVB) — the SFU ───────────────────────────────
  jvb:
    image: jitsi/jvb:${JITSI_IMAGE_VERSION:-stable-10078}
    restart: unless-stopped
    container_name: jitsi-jvb
    ports:
      - "10000:10000/udp"
      - "${JVB_TCP_PORT:-4443}:4443"
      # Internal HTTP API for colibri stats + Prometheus scrape.
      - "127.0.0.1:8080:8080"
    volumes:
      - ${CONFIG}/jvb:/config:Z
    environment:
      - DOCKER_HOST_ADDRESS
      - PUBLIC_URL
      # XMPP plumbing
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_SERVER
      # Service users
      - JVB_AUTH_USER
      - JVB_AUTH_PASSWORD
      - JVB_BREWERY_MUC
      - JVB_PORT
      - JVB_TCP_HARVESTER_DISABLED
      - JVB_TCP_PORT
      - JVB_TCP_MAPPED_PORT
      - JVB_STUN_SERVERS
      # Expose colibri + stats endpoints for Prometheus scraping.
      - JVB_ENABLE_APIS=rest,colibri,stats
      - JVB_WS_DOMAIN
      - JVB_WS_SERVER_ID
      - JVB_OCTO_BIND_ADDRESS
      - JVB_OCTO_PUBLIC_ADDRESS
      - JVB_OCTO_BIND_PORT
      - JVB_OCTO_REGION
      - TZ
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/about/health -o /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      prosody:
        condition: service_healthy
    networks:
      jitsi:

  # ── Jibri (server-side recording + livestreaming) ────────────────────
  # On meeting end, Jibri saves the .mp4 to JIBRI_RECORDING_DIR. The
  # finalize_recording.sh hook (mounted into /config) uploads it to
  # MinIO and POSTs a signed payload to /api/v1/huddles/jibri/webhook.
  #
  # NOTE: requires `snd_aloop` kernel module on the host:
  #   echo "snd_aloop" | sudo tee -a /etc/modules
  #   sudo modprobe snd_aloop
  jibri:
    image: jitsi/jibri:${JITSI_IMAGE_VERSION:-stable-10078}
    restart: unless-stopped
    container_name: jitsi-jibri
    privileged: true
    shm_size: "2gb"
    cap_add:
      - SYS_ADMIN
    volumes:
      - ${CONFIG}/jibri:/config:Z
      - /dev/shm:/dev/shm
      # Mount the finalize hook + jq + mc CLI so the script can run.
      - ./finalize_recording.sh:/config/finalize_recording.sh:ro
    environment:
      # XMPP plumbing
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_RECORDER_DOMAIN
      - XMPP_SERVER
      # Service users
      - JIBRI_XMPP_USER
      - JIBRI_XMPP_PASSWORD
      - JIBRI_BREWERY_MUC
      - JIBRI_RECORDER_USER
      - JIBRI_RECORDER_PASSWORD
      - JIBRI_RECORDING_DIR
      - JIBRI_FINALIZE_RECORDING_SCRIPT_PATH
      - JIBRI_STRIP_DOMAIN_JID
      - DISPLAY=:0
      # Lumicoria handoff (read by finalize_recording.sh)
      - LUMICORIA_BACKEND_URL
      - LUMICORIA_JIBRI_SECRET
      - LUMICORIA_MINIO_BUCKET
      - MINIO_ENDPOINT
      - MINIO_ACCESS_KEY
      - MINIO_SECRET_KEY
      - TZ
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:2222/jibri/api/v1.0/health -o /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    depends_on:
      prosody:
        condition: service_healthy
    networks:
      jitsi:

  # ── Coturn (TURN server for NAT traversal) ───────────────────────────
  # Production deployments hit symmetric NATs (corporate Wi-Fi, mobile
  # carriers) where direct UDP between peers can't be established. JVB's
  # STUN-only path fails; Coturn relays the media instead.
  #
  # Ports to open in the host firewall (in addition to JVB's 10000/UDP):
  #   3478/tcp + 3478/udp  — STUN/TURN
  #   5349/tcp             — TURNS (TLS)
  #   49152-65535/udp      — relay range
  #
  # The shared secret TURNCREDENTIALS_SECRET is the same value the `web`
  # service uses to generate per-user TURN credentials at room-join time.
  coturn:
    image: coturn/coturn:4.6-alpine
    restart: unless-stopped
    container_name: jitsi-coturn
    network_mode: host  # required for STUN to advertise the real public IP
    volumes:
      - ${CONFIG}/coturn:/config:Z
      - ${CONFIG}/web/letsencrypt:/etc/letsencrypt:ro
    command: >
      -n
      --log-file=stdout
      --listening-port=3478
      --tls-listening-port=5349
      --listening-ip=0.0.0.0
      --external-ip=${DOCKER_HOST_ADDRESS}
      --realm=${LETSENCRYPT_DOMAIN:-meet.lumicoria.ai}
      --server-name=${LETSENCRYPT_DOMAIN:-meet.lumicoria.ai}
      --use-auth-secret
      --static-auth-secret=${TURNCREDENTIALS_SECRET}
      --cert=/etc/letsencrypt/live/${LETSENCRYPT_DOMAIN:-meet.lumicoria.ai}/fullchain.pem
      --pkey=/etc/letsencrypt/live/${LETSENCRYPT_DOMAIN:-meet.lumicoria.ai}/privkey.pem
      --min-port=49152
      --max-port=65535
      --no-cli
      --no-stdout-log
      --pidfile=/var/tmp/turnserver.pid
      --no-loopback-peers
      --no-multicast-peers
    healthcheck:
      test: ["CMD-SHELL", "pidof turnserver || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

networks:
  jitsi:
    driver: bridge
