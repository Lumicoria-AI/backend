ai_models:
  # Provider-level defaults. The actual provider is selected by
  # DEFAULT_LLM_PROVIDER env var (or per-agent override below).
  # API keys are loaded from env vars — never hardcode secrets here.
  perplexity:
    model: "sonar-large-online"
  gemini:
    model: "gemini-2.0-flash"
  openai:
    model: "gpt-4o-mini"
  anthropic:
    model: "claude-3-5-sonnet-latest"
  mistral:
    model: "mistral-large-latest"


agents:
  # Agents use DEFAULT_LLM_PROVIDER unless 'provider' is explicitly set.
  # To pin an agent to a specific provider, add:  provider: "openai"
  document_agent:
    type: "document"
  wellbeing_agent:
    type: "wellbeing"
  vision_agent:
    type: "vision"
    vision_tasks: ["text_extraction", "object_detection", "scene_analysis", "content_description"]
  meeting_agent:
    type: "meeting"
  creative_agent:
    type: "creative"
    # Optionally pin to a specific provider:
    # provider: "gemini"
  student_agent:
    type: "student"
  rag:
    type: "rag"
    model_config:
      temperature: 0.7
      max_tokens: 1024
    context_settings:
      max_chunks: 8
      max_tokens: 8000
    system_prompt_template: |
      You are Lumicoria.ai, an AI assistant with access to the user's documents and knowledge. 
      Use the following context to help answer the user's question. 
      If the context doesn't contain relevant information, draw on your general knowledge 
      but prioritize what's in the user's documents. 
      Be clear when you're using information from their documents vs. your general knowledge.

      {context}