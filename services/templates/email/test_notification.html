<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .content {
            padding: 20px;
            background-color: #f9f9f9;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #666;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Lumicoria.ai</h1>
        </div>
        <div class="content">
            <h2>{{ subject }}</h2>
            <p>Hello {{ user_name }},</p>
            <p>{{ message }}</p>
            {% if action_url %}
            <center>
                <a href="{{ action_url }}" class="button">Take Action</a>
            </center>
            {% endif %}
        </div>
        <div class="footer">
            <p>This is an automated message from Lumicoria.ai. Please do not reply to this email.</p>
            <p>&copy; {{ year }} Lumicoria.ai. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
